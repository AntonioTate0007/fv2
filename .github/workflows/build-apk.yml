name: Build Autopilot APK

on:
  push:
    branches: [ "claude/robinhood-android-app-plan-cs9qbk" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish APK to dist/ on the branch
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/autopilot-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/autopilot-debug.apk
          if git diff --cached --quiet; then
            echo "APK unchanged — nothing to commit."
          else
            git commit -m "ci: build Autopilot debug APK [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
