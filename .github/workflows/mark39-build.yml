name: Build Mark XXXIX APK

on:
  push:
    branches:
      - "claude/jarvis-mobile-phone-hq14ns"
    paths:
      - "mark39/**"
      - ".github/workflows/mark39-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: mark39
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mark39-debug-apk
          path: mark39/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mark39-latest
          name: Mark XXXIX (latest debug build)
          body: |
            Installable debug build of **Mark XXXIX** — the standalone Android edition of
            FatihMakes' Mark-XXXIX-OR assistant (voice, ask-anything via Gemini/OpenRouter,
            reminders, memory).

            On your phone: open this page, download `app-debug.apk`, tap to install (allow
            "install from unknown sources"). Then open Settings and add a free Gemini or
            OpenRouter API key.
          prerelease: true
          files: mark39/app/build/outputs/apk/debug/app-debug.apk
