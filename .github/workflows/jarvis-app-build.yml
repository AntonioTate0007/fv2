name: Build Fortress App (Jarvis) APK

on:
  push:
    branches:
      - "claude/jarvis-mobile-phone-hq14ns"
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/jarvis-app-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortress-jarvis-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jarvis-app-latest
          name: Fortress + Jarvis (latest debug build)
          body: |
            Installable debug build of the Fortress app with the new on-phone
            **Jarvis** assistant (voice, reminders, daily briefing, calendar).

            On your phone: open this page, download `app-debug.apk`, and tap it to
            install. You may need to allow "install from unknown sources" for your
            browser. After installing, open Settings in the app and paste a Gemini
            API key to enable "ask anything"; reminders, calendar and the daily
            briefing work without one.
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
