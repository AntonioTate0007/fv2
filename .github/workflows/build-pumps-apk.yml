name: Build Pumps APK

# Builds the standalone :pumps Android module on every push to the dev
# branch and on PRs targeting main. The resulting debug APK is uploaded
# as a workflow artifact so it can be downloaded straight from the PR's
# "Checks" tab and sideloaded onto a phone — no local Android SDK needed.
#
# Push notifications via Firebase require google-services.json; the
# workflow writes one if the GOOGLE_SERVICES_JSON repo secret is set,
# otherwise it builds without Firebase (the WorkManager poller still
# fires local notifications, FCM just no-ops).

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

# Cancel an older run on the same branch the moment a newer push lands,
# and prevent the push + pull_request event pair from racing for the same
# Gradle cache key.
concurrency:
  group: build-pumps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build :pumps debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (handles caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        # Pinned to a known-stable release so floating-tag breakage on the
        # main `v3` branch can't take the build down.
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ""

      - name: Accept Android SDK licenses + install required packages
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          echo "[sdk] installed packages:"
          sdkmanager --list_installed | head -40 || true

      - name: Write pumps backend URL
        env:
          BACKEND_URL: ${{ secrets.PUMPS_BACKEND_URL }}
        run: |
          if [ -n "${BACKEND_URL}" ]; then
            echo "pumps.backend.url=${BACKEND_URL}" >> local.properties
            echo "[pumps] backend URL written to local.properties"
          else
            echo "[pumps] no PUMPS_BACKEND_URL secret — defaulting to placeholder (app runs in mock mode)"
          fi

      - name: Write google-services.json (if secret present)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "${GOOGLE_SERVICES_JSON}" ]; then
            printf '%s' "${GOOGLE_SERVICES_JSON}" > pumps/google-services.json
            echo "[pumps] google-services.json written (${#GOOGLE_SERVICES_JSON} bytes) — Firebase enabled"
          else
            echo "[pumps] no GOOGLE_SERVICES_JSON secret — building without Firebase (FCM disabled, WorkManager fallback still works)"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build :pumps debug APK
        run: ./gradlew :pumps:assembleDebug --no-daemon --stacktrace

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find pumps/build/outputs/apk/debug -name "*.apk" -print -quit)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced under pumps/build/outputs/apk/debug"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK ($(stat -c%s "$APK") bytes)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pumps-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
