name: Build Fortress Trader APK

on:
  push:
    branches: [ "claude/new-session-scah26" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-trader-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :trader:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortress-trader-debug-apk
          path: trader/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish APK to dist/ on the branch
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          APK=$(ls trader/build/outputs/apk/debug/*.apk | head -1)
          cp "$APK" dist/fortress-trader-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/fortress-trader-debug.apk
          if git diff --cached --quiet; then
            echo "APK unchanged — nothing to commit."
          else
            git commit -m "ci: build Fortress Trader debug APK [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
