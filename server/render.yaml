services:
  - type: web
    name: fortress-api
    runtime: docker
    rootDir: server
    plan: free
    healthCheckPath: /
    envVars:
      - key: FORTRESS_API_TOKEN
        generateValue: true   # auto-generated, copy this into local.properties
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"         # safe default — flip to "false" only when ready
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      # ── Jarvis / Telegram assistant ──────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL          # set to this service's public URL to enable webhooks
        sync: false
      - key: ELEVENLABS_API_KEY       # optional premium TTS; gTTS used when blank
        sync: false

  # ── Fortress Companion v1.1 — touchscreen UI ported to the web ──────────────
  - type: web
    name: fortress-companion
    runtime: docker
    rootDir: companion
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: TELEGRAM_BOT_TOKEN    # paste @BotFather token (or set via Settings tab)
        sync: false
      - key: TELEGRAM_CHAT_ID      # destination chat ID(s), comma-separated
        sync: false
      - key: FORTRESS_API_URL      # base URL of the fortress-api service (e.g. https://fortress-api.onrender.com)
        sync: false
      - key: FORTRESS_API_TOKEN    # bearer token for fortress-api's /v1/* routes
        sync: false
